<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Youtube Comment Markers — Ajustes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      padding: 24px;
      min-width: 320px;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #272727;
    }
    .field {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 6px;
    }
    label span {
      color: #e8e8e8;
      font-weight: 500;
    }
    input[type="number"] {
      width: 90px;
      background: #272727;
      border: 1px solid #3f3f3f;
      color: #fff;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 14px;
      outline: none;
    }
    input[type="number"]:focus { border-color: #ff0000; }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #ff0000;
      cursor: pointer;
    }
    .hint {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
    }
    button {
      margin-top: 8px;
      background: #ff0000;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #cc0000; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #3ea96b;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <h1>Youtube Comment Markers</h1>

  <div class="field">
    <label><span>Páginas máximas a cargar</span></label>
    <input type="number" id="maxPages" min="1" max="100" value="15">
    <div class="hint">Cada página tiene ≈ 20 comentarios. Por defecto: 15 páginas (~300 comentarios).</div>
  </div>

  <div class="field">
    <div class="toggle-row">
      <input type="checkbox" id="debugMode">
      <label for="debugMode"><span>Activar registro de depuración</span> (consola)</label>
    </div>
    <div class="hint">Muestra mensajes [YT-Overlay] en la consola de DevTools del navegador.</div>
  </div>

  <button id="save">Guardar</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
